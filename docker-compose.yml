# ══════════════════════════════════════════════════════════════════════
# Booking University Rooms — Docker Compose
# ══════════════════════════════════════════════════════════════════════

services:
  # ── Frontend (nginx + Vite SPA) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_TZ=${TZ:-Europe/Moscow}
    container_name: bur-frontend
    environment:
      TZ: "${TZ:-Europe/Moscow}"
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - frontend-net
    restart: unless-stopped

  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bur-backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      ENV: "${ENV:-production}"
      TZ: "${TZ:-Europe/Moscow}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-bur}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bur}?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}"
      JWT_ACCESS_TTL: "${JWT_ACCESS_TTL:-15m}"
      JWT_REFRESH_TTL: "${JWT_REFRESH_TTL:-720h}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      S3_ENDPOINT: "${S3_ENDPOINT:-minio:9000}"
      S3_BUCKET: "${S3_BUCKET:-room-photos}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minioadmin}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minioadmin}"
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      MEDIA_PUBLIC_BASE_PATH: "${MEDIA_PUBLIC_BASE_PATH:-/api/media}"
      MAX_ROOM_PHOTO_BYTES: "${MAX_ROOM_PHOTO_BYTES:-5242880}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: bur-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      TZ: "${TZ:-Europe/Moscow}"
    ports:
      - "5455:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bur}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO object storage ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: bur-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_KEY:-minioadmin}"
      TZ: "${TZ:-Europe/Moscow}"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
