# ══════════════════════════════════════════════════════════════════════
# Booking University Rooms — Docker Compose
# ══════════════════════════════════════════════════════════════════════

services:
  # ── Frontend (nginx + Vite SPA) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bur-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - frontend-net
    restart: unless-stopped

  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bur-backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      ENV: "${ENV:-production}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-bur}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bur}?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}"
      JWT_ACCESS_TTL: "${JWT_ACCESS_TTL:-15m}"
      JWT_REFRESH_TTL: "${JWT_REFRESH_TTL:-720h}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: bur-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bur}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bur}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  postgres-data:
