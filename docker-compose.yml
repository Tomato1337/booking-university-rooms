services:
  # ── Frontend (nginx + Vite SPA) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bur-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - frontend-net
    restart: unless-stopped

